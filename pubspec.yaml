name: homesales_tracker
description: "HomeSales Tracker - Sales tracking for homemade food business"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.0.0
  flutter_riverpod: ^2.0.0
  riverpod: ^2.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  http: ^1.1.0
  intl: ^0.20.2
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  flutter_dotenv: ^5.1.0
  uuid: ^4.0.0
  connectivity_plus: ^6.0.0
  google_fonts: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon.jpeg
  generate: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.jpeg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.jpeg"
